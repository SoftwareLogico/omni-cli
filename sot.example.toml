# Rename this file to sot.toml
# This file should be in .gitignore so your keys never leak.

[app]
name = "sot-cli"
data_dir = ".sot-cli"

[runtime]
primary_provider = "ollama"

[tools]
# Tool-output character ceiling: any tool result longer than this is truncated before reaching the model.
# Protects the context window from a single noisy command (long log dumps, recursive listings, etc.).
output_limit = 12000
# Default wall-clock timeout (seconds) for `run_command` foreground calls when the model omits `timeout_seconds`.
# The model can override per call. Increase if your typical commands legitimately run longer.
default_command_timeout_seconds = 180
# Byte threshold used by `read_files` to detect binary files: it inspects this many bytes
# at the start of the file and refuses to ingest non-UTF8 content beyond that boundary.
binary_check_size = 8192
# Stream the model's reasoning/thinking tokens to the terminal as they arrive.
# Set to false if the live reasoning trace is noisy in your terminal; the model still reasons internally.
show_thinking = true
# Stream raw tool-call argument chunks (and any other non-reasoning, non-text chunk) verbatim as the model
# generates them. Disable if you prefer to see only the assembled tool call line after streaming finishes.
show_full = true
max_rounds = 250                  # max tool-call rounds per user prompt (boss agent)
delegated_max_rounds = 80         # max tool-call rounds for a sub-agent
repeat_limit = 3                 # max consecutive identical rounds before abort (boss)
delegated_repeat_limit = 2       # max consecutive identical rounds before abort (sub-agent)
search_default_head_limit = 200  # default max result entries returned by search_code
search_max_line_length = 1000     # per-line truncation length inside search_code output
search_timeout_seconds = 30      # ripgrep/python-fallback timeout for a single search_code call
reasoning_char_budget = 10000              # hard cap on streamed reasoning chars per turn (boss); 0 disables
delegated_reasoning_char_budget = 8000    # same cap for sub-agent turns; 0 disables
compression_reasoning_trunc_chars = 240   # hard cap (chars) on the `reasoning` of tool-bearing assistants in CLOSED turns when the outbound payload is built; 0 disables (full reasoning round-trips). Same cap is also used for the reasoning excerpt embedded in the SYSTEM MESSAGE line that replaces successful write_file/edit_files pairs in old turns.
# Each setting above is documented in detail in ARCHITECTURE.md → "[tools] reference" section.

[providers.lmstudio]
base_url = "http://localhost:1234/v1"
model = "" #empty means it'll use the loaded one
temperature = 0.6
max_output_tokens = 8192

[providers.openrouter]
base_url = "https://openrouter.ai/api/v1"
model = "x-ai/grok-4.1-fast"
temperature = 0.6
max_output_tokens = 8192
http_referer = "https://github.com/SoftwareLogico/sot-cli"
app_title = "sot-cli"
reasoning_effort = "medium" # options: "none" | "minimal" | "low" | "medium" | "high" | "xhigh" — silently ignored by non-reasoning models

[providers.nvidia]
base_url = "https://integrate.api.nvidia.com/v1"
model = "qwen/qwen3-coder-480b-a35b-instruct"
temperature = 0.6
max_output_tokens = 8192

[providers.ollama]
base_url = "http://localhost:11434/v1"
model = "" #empty means it'll use the loaded one
temperature = 0.6
max_output_tokens = 8192

[providers.openai] # works with OpenAI and any OpenAI-compatible API
base_url = "https://api.openai.com/v1"
model = "gpt-5.4-mini-2026-03-17" # required — set to your served model name
temperature = 0.6
max_output_tokens = 8192
reasoning_effort = "medium" # options: "none" | "minimal" | "low" | "medium" | "high" | "xhigh" — only valid for reasoning models (gpt-5/o-series); on plain gpt-4* OpenAI returns HTTP 400, comment out or delete this line for those models

[mcp.servers.test]
command = "python"
args = ["mcps/test.py"]



